<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Викторина: Безопасность и привычки</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700&family=Inter:wght@400;600&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background: #fff7ed;
            color: #9a3412;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { font-family: 'Unbounded', sans-serif; }

        .quiz-card {
            background: white;
            border-radius: 2rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05);
        }

        .option-btn {
            transition: all 0.2s ease;
            background: #fffcf9;
            border: 2px solid #fed7aa;
            color: #431407;
        }

        .option-btn:hover:not(:disabled) {
            border-color: #f97316;
            background: #fff7ed;
            transform: translateY(-2px);
        }

        .option-btn.correct {
            background: #dcfce7;
            border-color: #22c55e;
            color: #15803d;
        }

        .option-btn.wrong {
            background: #fee2e2;
            border-color: #ef4444;
            color: #b91c1c;
        }

        .progress-bar {
            height: 8px;
            background: #ffedd5;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #f97316;
            transition: width 0.4s ease;
        }
    </style>
</head>
<body class="p-4">

    <header class="text-center py-8">
        <a href="index.html" class="text-orange-600 hover:underline text-sm font-bold uppercase tracking-widest">← На главную</a>
        <h1 class="text-2xl md:text-3xl font-bold mt-2 uppercase">Безопасность и Здоровье</h1>
    </header>

    <main class="max-w-2xl w-full">
        <div class="quiz-card p-6 md:p-10">
            <!-- Прогресс -->
            <div class="mb-8">
                <div class="flex justify-between text-xs font-bold uppercase mb-2 text-orange-400">
                    <span id="question-number">Вопрос 1 из 10</span>
                    <span id="score-display">Очки: 0</span>
                </div>
                <div class="progress-bar">
                    <div id="progress-fill" class="progress-fill" style="width: 0%"></div>
                </div>
            </div>

            <!-- Область вопроса -->
            <div id="quiz-content">
                <h2 id="question-text" class="text-xl md:text-2xl font-bold mb-8">Загрузка вопроса...</h2>
                <div id="options-grid" class="grid grid-cols-1 gap-4">
                    <!-- Варианты ответов -->
                </div>
            </div>

            <!-- Экран результатов -->
            <div id="result-screen" class="hidden text-center py-10">
                <div id="result-icon" class="text-7xl mb-6">🛡️</div>
                <h2 class="text-3xl font-black mb-2 uppercase">Тест пройден</h2>
                <p id="result-text" class="text-slate-500 mb-8">Ваша безопасность — в ваших руках!</p>
                <div class="bg-orange-50 p-6 rounded-2xl mb-8">
                    <div class="text-4xl font-black text-orange-600" id="final-score">0/10</div>
                    <div class="text-sm uppercase font-bold text-orange-700">Верных ответов</div>
                </div>
                <button onclick="location.reload()" class="bg-orange-600 text-white px-10 py-4 rounded-full font-bold shadow-lg hover:bg-orange-700 transition">Пройти заново</button>
            </div>
        </div>
    </main>

    <script>
        const quizData = [
            {
                q: "К чему ведет постоянное времяпрепровождение в телефоне или компьютере?",
                o: ["К улучшению зрения", "К бессоннице, депрессии и проблемам с учебой", "К повышению иммунитета", "К физической выносливости"],
                c: 1
            },
            {
                q: "Какую опасность представляют вейпы и электронные сигареты?",
                o: ["Они абсолютно безвредны", "Вызывают быструю зависимость и повреждают легкие", "Помогают лучше учиться", "Улучшают работу мозга"],
                c: 1
            },
            {
                q: "Что следует делать, если вы чувствуете, что вас преследуют на улице?",
                o: ["Зайти в темный подъезд", "Громко кричать: «Помогите, я его не знаю!» и зайти в людное место", "Просто ускорить шаг, не меняя маршрут", "Остановиться и подождать преследователя"],
                c: 1
            },
            {
                q: "Какой маршрут домой считается самым безопасным?",
                o: ["Короткий путь через пустыри", "Оживленные и хорошо освещенные улицы", "Путь через промышленные зоны", "Заброшенные стройки"],
                c: 1
            },
            {
                q: "Как правильно общаться с незнакомцами, которые просят о помощи или предлагают подвезти?",
                o: ["Согласиться помочь", "Не вступать в разговоры и не садиться в машину", "Показать дорогу, если это близко", "Взять у них подарок в знак вежливости"],
                c: 1
            },
            {
                q: "Что разрушает употребление алкоголя даже в «легком» виде?",
                o: ["Укрепляет нервную систему", "Разрушает печень, мозг и замедляет развитие", "Повышает аппетит", "Не влияет на подростка"],
                c: 1
            },
            {
                q: "Как безопасно переходить дорогу, если нет тротуара?",
                o: ["Посередине проезжей части", "Идти навстречу движению транспорта", "Идти по направлению движения машин", "Бежать как можно быстрее"],
                c: 1
            },
            {
                q: "Где лучше всего садиться в общественном транспорте в целях безопасности?",
                o: ["На самом последнем ряду", "Ближе к водителю", "У самой двери спиной к салону", "На пол"],
                c: 1
            },
            {
                q: "Что относится к вредным привычкам в питании?",
                o: ["Употребление овощей", "Перекусы фастфудом и «заедание» стресса", "Питьевой режим", "Сбалансированный завтрак"],
                c: 1
            },
            {
                q: "О чем всегда нужно информировать родителей?",
                o: ["Только о хороших оценках", "Где вы находитесь, с кем и когда вернетесь", "Ни о чем, я уже взрослый", "О своих покупках в интернете"],
                c: 1
            }
        ];

        let currentQuestion = 0;
        let score = 0;
        let canAnswer = true;

        function loadQuestion() {
            canAnswer = true;
            const q = quizData[currentQuestion];
            document.getElementById('question-number').textContent = `Вопрос ${currentQuestion + 1} из ${quizData.length}`;
            document.getElementById('question-text').textContent = q.q;
            document.getElementById('progress-fill').style.width = `${(currentQuestion / quizData.length) * 100}%`;
            
            const optionsGrid = document.getElementById('options-grid');
            optionsGrid.innerHTML = '';
            
            q.o.forEach((option, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn p-4 rounded-2xl text-left font-medium';
                btn.textContent = option;
                btn.onclick = () => checkAnswer(index);
                optionsGrid.appendChild(btn);
            });
        }

        function checkAnswer(idx) {
            if (!canAnswer) return;
            canAnswer = false;

            const q = quizData[currentQuestion];
            const buttons = document.querySelectorAll('.option-btn');
            
            if (idx === q.c) {
                buttons[idx].classList.add('correct');
                score++;
            } else {
                buttons[idx].classList.add('wrong');
                buttons[q.c].classList.add('correct');
            }

            document.getElementById('score-display').textContent = `Очки: ${score}`;

            setTimeout(() => {
                currentQuestion++;
                if (currentQuestion < quizData.length) {
                    loadQuestion();
                } else {
                    showResults();
                }
            }, 1500);
        }

        function showResults() {
            document.getElementById('progress-fill').style.width = '100%';
            document.getElementById('quiz-content').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('final-score').textContent = `${score}/${quizData.length}`;
            
            const resultText = document.getElementById('result-text');
            if (score === quizData.length) {
                resultText.textContent = "Превосходно! Вы отлично знаете правила безопасности и риски вредных привычек.";
            } else if (score >= quizData.length / 2) {
                resultText.textContent = "Хороший результат. Но будьте внимательнее к деталям своей безопасности.";
            } else {
                resultText.textContent = "Рекомендуем внимательно изучить правила безопасности еще раз.";
            }
        }

        loadQuestion();
    </script>
</body>
</html>
